<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PRIME AUTO v5 — APPRENTISSAGE INTÉGRÉ</title>
<style>
/* ... (Gardez ici TOUS vos styles existants du fichier original) ... */
.journal-section { background: var(--surface2); padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px solid var(--border); }
.stats-box { font-size: 11px; color: var(--gold); margin-bottom: 10px; }
.hist-item { background: var(--surface); border: 1px solid var(--border); padding: 8px; margin-bottom: 5px; font-size: 10px; display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div class="page" id="page-4">
    <div class="sec">📈 Journal d'Apprentissage</div>
    <div id="stats" class="stats-box">Win Rate: 0% (0 trades)</div>
    <div id="history-list"></div>
</div>

<script>
    // ── 1. LOGIQUE D'APPRENTISSAGE (NIVEAUX 1, 2, 3) ──

    // Sauvegarde un résultat (Niveau 1)
    function saveTrade(pair, type, result) {
        let history = JSON.parse(localStorage.getItem('primeAutoHistory') || '[]');
        history.push({
            date: new Date().toLocaleTimeString(),
            pair: pair,
            type: type,
            result: result
        });
        localStorage.setItem('primeAutoHistory', JSON.stringify(history.slice(-50)));
        updateJournalUI();
        applyFeedbackLoop(); // Déclenche Niveau 2
    }

    // Feedback Loop : Durcit les filtres si trop de pertes (Niveau 2)
    function applyFeedbackLoop() {
        let history = JSON.parse(localStorage.getItem('primeAutoHistory') || '[]');
        let recentLosses = history.slice(-3).filter(t => t.result === 'loss').length;
        if (recentLosses >= 2) {
            console.log("Apprentissage : Filtres renforcés.");
            // Logique d'ajustement : ex: augmenter le min-confidence
            let conf = document.getElementById('min-confidence');
            if(conf) conf.value = 90; 
        }
    }

    // Mémoire IA : À ajouter dans votre prompt Groq (Niveau 3)
    function getMemoryContext() {
        let history = JSON.parse(localStorage.getItem('primeAutoHistory') || '[]');
        if (history.length === 0) return "";
        return "\nCONSIGNES MÉMOIRE : Analyse ces résultats récents pour améliorer la stratégie : " + JSON.stringify(history.slice(-3));
    }

    // Mise à jour interface
    function updateJournalUI() {
        let history = JSON.parse(localStorage.getItem('primeAutoHistory') || '[]');
        let wins = history.filter(t => t.result === 'win').length;
        let rate = history.length ? Math.round((wins / history.length) * 100) : 0;
        document.getElementById('stats').innerText = `Win Rate: ${rate}% (sur ${history.length} trades)`;
        
        const list = document.getElementById('history-list');
        list.innerHTML = history.slice().reverse().map(t => `
            <div class="hist-item">
                <span>${t.pair} | ${t.type}</span>
                <span style="color:${t.result==='win'?'var(--green)':'var(--red)'}">${t.result.toUpperCase()}</span>
            </div>
        `).join('');
    }

    // ── 2. VOTRE LOGIQUE EXISTANTE (Intégrée sans suppression) ──
    // ... (Gardez ici toutes vos fonctions : selectMarket, goTab, saveConfig, etc.) ...
    
    // Initialisation au chargement
    window.onload = function() {
        loadConfig();
        updateJournalUI();
    };
</script>
</body>
</html>
